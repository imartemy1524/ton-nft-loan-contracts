<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Document body with folded corner -->
  <path d="M10 6 H40 L54 20 V58 H10 Z" fill="#7aa2ff"/>
  <!-- Folded corner highlight -->
  <path d="M40 6 V20 H54 Z" fill="#9ab8ff"/>
  <!-- Contract lines -->
  <g stroke="#3f6cd8" stroke-width="2" stroke-linecap="round" opacity="0.7">
    <line x1="16" y1="28" x2="28" y2="28"/>
    <line x1="16" y1="34" x2="26" y2="34"/>
    <line x1="16" y1="40" x2="24" y2="40"/>
  </g>
  <!-- NFT diamond -->
  <g transform="translate(30,26)">
    <path d="M10 0 L20 8 L10 22 L0 8 Z" fill="#0b0f1a"/>
    <path d="M10 0 L20 8 L10 11 L0 8 Z" fill="#1c2540"/>
    <path d="M10 11 L20 8 L10 22 Z" fill="#0b0f1a" opacity="0.4"/>
  </g>
  <!-- Padlock -->
  <g transform="translate(4,2)">
    <path d="M5 8 V6 a5 5 0 0 1 10 0 V8" fill="none" stroke="#ffffff" stroke-width="2.4" stroke-linecap="round"/>
    <rect x="2" y="8" width="16" height="12" rx="2.5" fill="#ffffff"/>
    <circle cx="10" cy="13" r="1.4" fill="#3f6cd8"/>
    <rect x="9.3" y="13" width="1.4" height="3.5" fill="#3f6cd8"/>
  </g>
</svg>
